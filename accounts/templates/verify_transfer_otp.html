{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>

/* 🌈 Background */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0d6efd, #6610f2, #20c997);
    background-size: 300% 300%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🧊 Card */
.otp-card {
    width: 100%;
    max-width: 400px;
    border-radius: 25px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    color: white;
    animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ✨ Input */
.form-control {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    padding: 12px;
}

.form-control::placeholder {
    color: #ddd;
}

.form-control:focus {
    background: transparent;
    border-color: #00c6ff;
    box-shadow: 0 0 10px #00c6ff;
    color: white;
}

/* 🔘 Button */
.btn-verify {
    border-radius: 30px;
    padding: 12px;
    font-weight: bold;
    background: linear-gradient(90deg, #28a745, #20c997);
    border: none;
    transition: 0.3s;
}

.btn-verify:hover {
    transform: scale(1.05);
}

/* 📱 Mobile */
@media (max-width: 480px) {

    .otp-card {
        padding: 20px;
        border-radius: 20px;
    }

    h4 {
        font-size: 18px;
    }

    .form-control {
        font-size: 14px;
        padding: 10px;
    }

    .btn-verify {
        font-size: 14px;
    }
}

/* 📲 Tablet */
@media (max-width: 768px) {
    .otp-card {
        max-width: 90%;
    }
}

</style>

<body id="otp-page">


<div class="container d-flex justify-content-center align-items-center" style="min-height:90vh;">

    <div class="card otp-card p-4 text-center">

        <h4 class="mb-3">🔐 Enter OTP</h4>

        {% if otp %}
        <div class="alert alert-info text-dark">
            <strong>OTP:</strong> {{ otp }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="otp"
                   class="form-control text-center"
                   placeholder="Enter 6-digit OTP"
                   maxlength="6"
                   required>

            <button type="submit" class="btn btn-verify w-100 mt-3 text-white">
                Verify & Transfer
            </button>
        </form>
    <p id="timer" class="mt-3 fw-bold" style="color: #ffcc00; font-size: 16px;">  OTP expires in 60s</p>
    </div>

</div>


<p id="timer" class="text-warning mt-2">OTP expires in 60s</p>

{% comment %} {% if messages %}
    {% for message in messages %}
        <div class="d-none message-tag" data-tag="{{ message.tags }}"></div>
    {% endfor %}
{% endif %} {% endcomment %}


<!-- 🔊 OTP SOUND -->
<audio id="otpSound" preload="auto">
    <source src="{% static 'sounds/otp.mp3' %}" type="audio/mpeg">
</audio>

<script>

document.addEventListener("DOMContentLoaded", function () {

    let audio = document.getElementById("otpSound");

    // 🔊 PLAY SOUND ON PAGE LOAD (OTP page open)
    audio.play().catch(err => {
        console.log("Autoplay blocked:", err);
    });

});

</script>

{% endblock %}
