{% extends 'base.html' %}

{% block content %}

<style>

/* 🌈 Background */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0d6efd, #6610f2, #20c997);
    background-size: 300% 300%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🧊 Card */
.otp-card {
    width: 100%;
    max-width: 400px;
    border-radius: 25px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    color: white;
    animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
    from {opacity: 0; transform: translateY(50px);}
    to {opacity: 1; transform: translateY(0);}
}

/* 🔢 OTP Boxes */
.otp-box {
    width: 50px;
    height: 55px;
    text-align: center;
    font-size: 22px;
    margin: 5px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 12px;
    background: transparent;
    color: white;
    transition: 0.3s;
}

.otp-box:focus {
    border-color: #00c6ff;
    box-shadow: 0 0 10px #00c6ff;
    outline: none;
    transform: scale(1.05);
}

/* 🔘 Button */
.btn-verify {
    border-radius: 30px;
    padding: 12px;
    font-weight: bold;
    background: linear-gradient(90deg, #ff9800, #ff5722);
    border: none;
    transition: 0.3s;
}

.btn-verify:hover {
    transform: scale(1.05);
}

/* 📱 Mobile */
@media (max-width: 480px) {

    .otp-card {
        padding: 20px;
        border-radius: 20px;
    }

    .otp-box {
        width: 42px;
        height: 48px;
        font-size: 18px;
        margin: 3px;
    }

    h3 {
        font-size: 20px;
    }
}

/* 📲 Tablet */
@media (max-width: 768px) {
    .otp-card {
        max-width: 90%;
    }
}

</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:90vh;">

    <div class="card otp-card p-4 text-center">

        <h3 class="mb-2">🔐 OTP Verification</h3>

        {% if otp %}
        <p class="text-danger fw-bold">
            Your OTP: {{ otp }}
        </p>
        {% endif %}

        <p class="text-light mb-4">
            Enter the 6-digit code
        </p>

        <form method="POST" id="otp-form">
            {% csrf_token %}

            <div class="d-flex justify-content-center flex-wrap">
                <input type="text" maxlength="1" class="otp-box" required>
                <input type="text" maxlength="1" class="otp-box" required>
                <input type="text" maxlength="1" class="otp-box" required>
                <input type="text" maxlength="1" class="otp-box" required>
                <input type="text" maxlength="1" class="otp-box" required>
                <input type="text" maxlength="1" class="otp-box" required>
            </div>

            <input type="hidden" name="otp" id="otp-full">

            <button type="submit" class="btn btn-verify w-100 mt-4 text-white">
                Verify OTP
            </button>
        </form>

        {% if error %}
        <div class="alert alert-danger mt-3">
            {{ error }}
        </div>
        {% endif %}

        <p class="mt-3">
            Didn’t receive OTP?
            <a href="#" class="fw-bold text-warning">Resend</a>
        </p>

    </div>

</div>

<script>

const form = document.getElementById("otp-form");
const inputs = document.querySelectorAll(".otp-box");
const hiddenInput = document.getElementById("otp-full");

function updateOTP() {
    let otp = "";
    inputs.forEach(i => otp += i.value);
    hiddenInput.value = otp;
}

form.addEventListener("submit", async function(e) {

    e.preventDefault();

    updateOTP();

    if (hiddenInput.value.length !== 6) {
        alert("Please enter full 6-digit OTP");
        return;
    }

    let btn = form.querySelector("button");
    btn.innerHTML = "Verifying...";
    btn.disabled = true;

    // 🔊 CREATE AUDIO
    const audio = new Audio('/static/sounds/otp.mp3');

    try {
        await audio.play(); // ⬅️ IMPORTANT (ensures it plays before submit)

        // ⏳ Slight delay AFTER sound starts
        setTimeout(() => {
            form.submit();
        }, 300);

    } catch (err) {
        console.log("Sound blocked:", err);

        // fallback → still submit
        form.submit();
    }

});

</script>
{% endblock %}
