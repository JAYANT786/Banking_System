{% extends 'base.html' %}
{% block content %}

<style>

/* 🌈 Background */
body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #0d6efd, #6610f2, #20c997);
    background-size: 300% 300%;
    animation: gradientMove 10s ease infinite;
    overflow-x: hidden;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🧊 Card */
.reset-card {
    width: 100%;
    max-width: 420px;
    padding: 25px;
    border-radius: 25px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    color: white;
    animation: fadeUp 0.7s ease;
}

@keyframes fadeUp {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ✨ Inputs */
.form-control {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 12px;
    font-size: 15px;
}

.form-control::placeholder {
    color: #ddd;
}

.form-control:focus {
    background: transparent;
    border-color: #00c6ff;
    box-shadow: 0 0 10px #00c6ff;
    color: white;
}

/* 🔘 Button */
.btn-reset {
    width: 100%;
    border-radius: 30px;
    padding: 12px;
    font-weight: bold;
    font-size: 15px;
    background: linear-gradient(90deg, #ff9800, #ff5722);
    border: none;
    transition: 0.3s;
}

.btn-reset:hover {
    transform: scale(1.04);
    box-shadow: 0 0 15px #ff9800;
}

/* 🔐 Strength */
.strength {
    height: 5px;
    border-radius: 5px;
    background: #ccc;
    margin-top: 5px;
    overflow: hidden;
}

.strength-bar {
    height: 100%;
    width: 0%;
    transition: 0.3s;
}

/* 👁 Toggle */
.toggle-eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #ccc;
}

/* 📱 Mobile */
@media (max-width: 480px) {

    .reset-card {
        padding: 20px;
        border-radius: 20px;
    }

    h3 {
        font-size: 20px;
    }

    .form-control {
        font-size: 14px;
        padding: 10px;
    }

    .btn-reset {
        font-size: 14px;
        padding: 10px;
    }
}

/* 📲 Tablet */
@media (max-width: 768px) {
    .reset-card {
        max-width: 95%;
    }
}

</style>

<div class="container d-flex justify-content-center align-items-center px-2" style="min-height:100vh;">

    <div class="reset-card">

        <h3 class="text-center mb-2">🔁 Reset Password</h3>
        <p class="text-center text-light mb-4">
            Create a new secure password
        </p>

        <!-- ✅ Success message -->
        {% if success %}
        <div class="alert alert-success text-center">
            ✅ Password reset successful! Redirecting...
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- Password -->
            <div class="mb-3 position-relative">
                <input type="password" id="password1" name="password1"
                       class="form-control"
                       placeholder="New Password"
                       oninput="checkStrength()" required>

                <span class="toggle-eye" onclick="togglePassword('password1','eye1')">
                    <i class="bi bi-eye" id="eye1"></i>
                </span>

                <div class="strength">
                    <div id="strength-bar" class="strength-bar"></div>
                </div>
            </div>

            <!-- Confirm -->
            <div class="mb-3 position-relative">
                <input type="password" id="password2" name="password2"
                       class="form-control"
                       placeholder="Confirm Password"
                       oninput="checkMatch()" required>

                <span class="toggle-eye" onclick="togglePassword('password2','eye2')">
                    <i class="bi bi-eye" id="eye2"></i>
                </span>

                <small id="matchText"></small>
            </div>

            <!-- Button -->
            <button id="submitBtn" class="btn btn-reset text-white" disabled>
                🔐 Reset Password
            </button>

        </form>

    </div>

</div>

<script>

/* 👁 Toggle */
function togglePassword(field, iconId) {
    let input = document.getElementById(field);
    let icon = document.getElementById(iconId);

    if (input.type === "password") {
        input.type = "text";
        icon.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("bi-eye-slash", "bi-eye");
    }
}

/* 🔐 Strength */
function checkStrength() {
    let pass = document.getElementById("password1").value;
    let bar = document.getElementById("strength-bar");

    let strength = 0;

    if (pass.length > 5) strength += 25;
    if (pass.length > 8) strength += 25;
    if (/[A-Z]/.test(pass)) strength += 25;
    if (/[0-9]/.test(pass)) strength += 25;

    bar.style.width = strength + "%";

    if (strength < 50) bar.style.background = "red";
    else if (strength < 75) bar.style.background = "orange";
    else bar.style.background = "lime";

    checkMatch();
}

/* 🔁 Match */
function checkMatch() {
    let p1 = document.getElementById("password1").value;
    let p2 = document.getElementById("password2").value;
    let text = document.getElementById("matchText");
    let btn = document.getElementById("submitBtn");

    if (!p1 || !p2) {
        text.innerText = "";
        btn.disabled = true;
        return;
    }

    if (p1 === p2) {
        text.innerText = "✔ Passwords match";
        text.style.color = "lightgreen";
        btn.disabled = false;
    } else {
        text.innerText = "❌ Passwords do not match";
        text.style.color = "red";
        btn.disabled = true;
    }
}

</script>

<!-- 🔁 Redirect (safe) -->
{% if success %}
<script>
setTimeout(() => {
    window.location.href = "{% url 'login' %}";
}, 2000);
</script>
{% endif %}

{% endblock %}
