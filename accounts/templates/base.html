{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Bank</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        overflow-x: hidden;
        margin: 0;
      }

      /* 🔝 Top Navbar */
      .top-navbar {
        background: #111;
        color: white;
        padding: 10px 0;
      }

      .logo {
        font-size: 18px;
        font-weight: bold;
      }

      /* 🔻 Bottom Nav */
      .bottom-nav {
        display: flex;
        justify-content: space-around;
        align-items: center;
        position: fixed;
        bottom: 0;
        width: 100%;
        background: #111;
        padding: 8px 0;
        z-index: 999;
      }

      .bottom-nav .nav-item {
        color: white;
        text-align: center;
        font-size: 12px;
        text-decoration: none;
      }

      .bottom-nav i {
        font-size: 18px;
        display: block;
      }

      .bottom-nav .active {
        color: #0d6efd;
      }

      .container {
        padding-bottom: 70px;
      }

      /* 🎉 SUCCESS POPUP */
      .success-popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .popup-content {
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        animation: scaleIn 0.4s ease;
        width: 280px;
      }

      .checkmark {
        font-size: 50px;
        color: #28a745;
        margin-bottom: 10px;
      }

      @keyframes scaleIn {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <!-- 🔝 TOP NAV -->
    <nav class="top-navbar">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="logo">💳 MyBank</div>

        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-person-circle"></i>
          <span>{{ request.user.username }}</span>

          <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-light">
              <i class="bi bi-box-arrow-right"></i>
            </button>
          </form>
        </div>
      </div>
    </nav>

    <!-- 🔷 APP BAR -->
    <nav class="navbar navbar-dark bg-primary px-3">
      <span class="navbar-brand h5"> <i class="bi bi-bank"></i> MyBank </span>
    </nav>

    <!-- 📦 MAIN CONTENT -->
    <div class="container mt-3">{% block content %} {% endblock %}</div>

    <!-- 🔊 AUDIO SYSTEM -->
    <audio id="errorSound" preload="auto">
      <source src="{% static 'sounds/error.mp3' %}" type="audio/mpeg" />
    </audio>

    <!-- 🔻 BOTTOM NAV -->
    <nav class="bottom-nav">
      <a href="/" class="nav-item">
        <i class="bi bi-house"></i>
        <span>Home</span>
      </a>

      <a href="/deposit/" class="nav-item">
        <i class="bi bi-plus-circle"></i>
        <span>Deposit</span>
      </a>

      <a href="/withdraw/" class="nav-item">
        <i class="bi bi-dash-circle"></i>
        <span>Withdraw</span>
      </a>

      <a href="/history/" class="nav-item">
        <i class="bi bi-clock-history"></i>
        <span>History</span>
      </a>
    </nav>

    {% if messages %} {% for message in messages %}
    <div
      class="d-none message-data"
      data-message="{{ message }}"
      data-tags="{{ message.tags }}"
    ></div>
    {% endfor %} {% endif %}

    <!-- 🎉 SUCCESS POPUP -->
    <div id="successPopup" class="success-popup">
      <div class="popup-content">
        <div id="popupIcon" class="checkmark">✔</div>
        <h4 id="popupTitle">Success!</h4>
        <p id="popupMessage"></p>
      </div>
    </div>

    <!-- JS -->
    <script src="{% static 'js/script.js' %}"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
/* 🔓 STEP 1: Unlock audio on first user interaction */
let audioUnlocked = false;

document.addEventListener("click", () => {
    if (!audioUnlocked) {
        const dummy = new Audio();
        dummy.play().catch(() => {});
        audioUnlocked = true;
    }
});

/* 🔊 STEP 2: Play sound function */
function playSound(file) {
    const audio = new Audio(`/static/sounds/${file}`);
    audio.play().catch(err => console.log("Blocked:", err));
}

/* 🎉 CONFETTI */
function launchConfetti() {
    let duration = 1500;
    let end = Date.now() + duration;

    (function frame() {
        confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0 }
        });

        confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }
    })();
}

/* 🎉 POPUP */
function showPopup(message, type) {
    let popup = document.getElementById("successPopup");
    let msg = document.getElementById("popupMessage");
    let title = document.getElementById("popupTitle");
    let icon = document.getElementById("popupIcon");

    popup.style.display = "none";

    setTimeout(() => {

        msg.innerText = message;

        // ✅ SUCCESS
        if (
            type.includes("success") ||
            type.includes("sound-deposit") ||
            type.includes("sound-transfer") ||
            type.includes("sound-withdraw")
        ) {
            title.innerText = "Success!";
            icon.innerText = "✔";
            icon.style.color = "#28a745";

            launchConfetti();
        }

        // ❌ ERROR
        else if (type.includes("error") || type.includes("sound-error")) {
            title.innerText = "Error!";
            icon.innerText = "✖";
            icon.style.color = "#dc3545";
        }

        popup.style.display = "flex";

        setTimeout(() => {
            popup.style.display = "none";
        }, 1200);

    }, 50);
}

/* 🚀 STEP 3: Play sound AFTER redirect using Django messages */
document.addEventListener("DOMContentLoaded", () => {

    document.querySelectorAll(".message-data").forEach((msg) => {
        let text = msg.dataset.message;
        let type = msg.dataset.tags;

        if (type.includes("sound-deposit")) {
            playSound("deposit.mp3");
            showPopup(text, type);
        }
        else if (type.includes("sound-withdraw")) {
            playSound("withdraw.mp3");
            showPopup(text, type);
        }
        else if (type.includes("sound-transfer")) {
            playSound("transfer.mp3");
            showPopup(text, type);
        }
        else if (type.includes("sound-otp")) {
            playSound("otp.mp3");
        }
        else if (type.includes("sound-error")) {
            playSound("error.mp3");
            showPopup(text, type);
        }
    });

});
</script>
  </body>
</html>
