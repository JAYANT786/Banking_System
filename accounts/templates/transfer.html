{% extends 'base.html' %}

{% block content %}

<style>

/* 🌈 Background */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0d6efd, #6610f2, #20c997);
    background-size: 300% 300%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* 🧊 Glass Card */
.transfer-card {
    width: 100%;
    max-width: 420px;
    border-radius: 25px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    color: white;
    animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
    from {opacity: 0; transform: translateY(50px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ✨ Inputs */
.form-control {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 12px;
}

.form-control::placeholder {
    color: #ddd;
}

.form-control:focus {
    background: transparent;
    border-color: #00c6ff;
    box-shadow: 0 0 10px #00c6ff;
    color: white;
}

/* 💰 Input group */
.input-group-text {
    border: none;
}

/* ⚡ Quick buttons */
.quick-transfer {
    flex: 1;
    margin: 0 3px;
    border-radius: 20px;
}

/* 🔘 Button */
.submit-btn {
    padding: 12px;
    font-weight: bold;
    transition: 0.3s;
}

.submit-btn:hover {
    transform: scale(1.05);
}

/* 📱 Mobile */
@media (max-width: 480px) {

    .transfer-card {
        padding: 20px !important;
        border-radius: 20px;
    }

    h3 {
        font-size: 20px;
    }

    .form-control {
        font-size: 14px;
        padding: 10px;
    }

    .submit-btn {
        font-size: 14px;
    }
}

/* 📲 Tablet */
@media (max-width: 768px) {
    .transfer-card {
        max-width: 90%;
    }
}

</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:90vh;">

    <div class="card transfer-card shadow-lg border-0 p-4">

        <!-- Title -->
        <h3 class="text-center mb-2">💸 Transfer Money</h3>
        <p class="text-center text-light mb-4">
            Send money securely
        </p>

        <form method="POST" id="transferForm">
            {% csrf_token %}

            <!-- Receiver -->
            <div class="mb-3">
                <label class="form-label">Receiver Account</label>
                <input 
                    type="text" 
                    name="account_number" 
                    class="form-control" 
                    placeholder="Enter account number"
                    required
                >
            </div>

            <!-- Amount -->
            <div class="mb-3">
                <label class="form-label">Amount</label>
                <div class="input-group">
                    <span class="input-group-text bg-primary text-white">₹</span>
                    <input 
                        type="number" 
                        name="amount" 
                        class="form-control" 
                        placeholder="Enter amount"
                        min="1"
                        required
                    >
                </div>
            </div>

            <!-- Quick Amount -->
            <div class="d-flex mb-3">
                <button type="button" class="btn btn-outline-light quick-transfer">₹100</button>
                <button type="button" class="btn btn-outline-light quick-transfer">₹500</button>
                <button type="button" class="btn btn-outline-light quick-transfer">₹1000</button>
            </div>

            <!-- Submit -->
            <button class="btn btn-primary w-100 rounded-pill submit-btn">
                <i class="bi bi-send"></i> Transfer Now
            </button>

        </form>

    </div>

</div>

<!-- ⚡ Quick Amount Script -->
<script>

/* ⚡ Quick Amount */
document.querySelectorAll(".quick-transfer").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelector("input[name='amount']").value =
            btn.innerText.replace("₹", "");
    });
});

/* 🚀 Transfer Submit (NO SOUND HERE) */
const form = document.getElementById("transferForm");

form.addEventListener("submit", function(e) {

    e.preventDefault(); // stop immediate submit

    let btn = document.querySelector(".submit-btn");

    // 🎯 Loading UI
    btn.innerHTML = "Processing...";
    btn.disabled = true;

    // ⏳ Submit to backend → OTP page
    form.submit();

});

</script>
{% endblock %}
